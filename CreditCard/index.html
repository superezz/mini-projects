<!DOCTYPE html>
<html lang="en">
<head>
  <title>Credit Card UI Design</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <span class="logo">
        <img src="images/logo.png" alt="">
        <h5>Master Card</h5>
      </span>
      <img src="images/chip.png" alt="" class="chip">
    </header>
    <div class="card-details">
      <div class="card-number">
        <h6>Card Number</h6>
        <h5 class="number">8060 40 90 2030 4070</h5>
        <h5 class="name">ARYA RCB</h5>
      </div>
      <div class="valid-date">
        <h6>Valid Thru</h6>
        <h5>05/30</h5>
      </div>
    </div>
  </div>
</body>
</html>
